name: Update IPTV Source

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download IPTV source
        run: |
          mkdir -p output
          curl -L https://iptv-org.github.io/iptv/index.m3u -o output/source.m3u

      - name: Generate subscribe.txt
        run: |
          echo "https://raw.githubusercontent.com/${{ github.repository }}/main/output/source.m3u" > subscribe.txt

      - name: Commit update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Update IPTV source" || exit 0
          git push
